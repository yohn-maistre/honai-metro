<!doctype html>
<html class="dark font-sans" lang="id">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/img/logo-background.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- Static shell meta: SSR is off, so non-JS scrapers (WhatsApp link
         previews) only ever see these. Per-page tags layer on client-side. -->
    <title>ETNOS</title>
    <meta
      name="description"
      content="ETNOS adalah ruang publik Tanah Papua: forum komunitas, wiki, dan data publik dalam satu tempat."
    />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="ETNOS" />
    <meta property="og:title" content="ETNOS · Ruang publik Tanah Papua" />
    <meta
      property="og:description"
      content="Forum komunitas, wiki, dan data publik Tanah Papua dalam satu tempat."
    />
    <meta property="og:url" content="https://etnos.pages.dev/" />
    <meta property="og:image" content="https://etnos.pages.dev/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="theme-color"
      media="(prefers-color-scheme: light)"
      content="#d6cbac"
    />
    <meta
      name="theme-color"
      media="(prefers-color-scheme: dark)"
      content="#1c1c20"
    />
    %sveltekit.head%
  </head>
  <body>
    <div
      style="z-index:-50;position:absolute;inset:0;display:grid;place-items:center; "
    >
      <svg width="50" height="50"><use width="50" height="50" href="/img/logo-isolated.svg#logo"></use></svg>
    </div>
    <div style="display: contents;" data-sveltekit-preload-code>
      %sveltekit.body%
    </div>
  </body>
</html>
